name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: sshops-windows-amd64.exe
            archive: zip
          - goos: linux
            goarch: amd64
            binary: sshops-linux-amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            binary: sshops-linux-arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            binary: sshops-darwin-amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            binary: sshops-darwin-arm64
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${DATE}" -o "${{ matrix.binary }}" .

      - name: Package artifact (zip)
        if: matrix.archive == 'zip'
        run: |
          zip "${{ matrix.binary }}.zip" "${{ matrix.binary }}"

      - name: Package artifact (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "${{ matrix.binary }}.tar.gz" "${{ matrix.binary }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: |
            ${{ matrix.binary }}.zip
            ${{ matrix.binary }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
