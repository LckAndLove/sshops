name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary_name: sshops-windows-amd64.exe
            archive_ext: zip
          - goos: linux
            goarch: amd64
            binary_name: sshops-linux-amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            binary_name: sshops-linux-arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            binary_name: sshops-darwin-amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            binary_name: sshops-darwin-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p dist
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o "dist/${{ matrix.binary_name }}" .

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && zip -9 "${{ matrix.binary_name }}.zip" "${{ matrix.binary_name }}")
          else
            chmod +x "dist/${{ matrix.binary_name }}"
            tar -C dist -czf "dist/${{ matrix.binary_name }}.tar.gz" "${{ matrix.binary_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary_name }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2.5.0
        with:
          body: ""
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
